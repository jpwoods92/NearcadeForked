<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080808;
        --surface: #141414;
        --surface-hover: #1e1e1e;
        --accent: #c084fc;
        --accent-rgb: 192, 132, 252;
        --accent-dim: rgba(192, 132, 252, 0.12);
        --text: #e8e8e8;
        --muted: #888;
        --muted2: #666;
        --border: #222;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'IBM Plex Mono', monospace;
        overflow: hidden;
      }
      .go-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .go-header h1 {
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.04em;
        flex: 1;
        white-space: nowrap;
        text-shadow: 0 0 20px var(--accent-dim);
      }
      .go-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--muted);
        cursor: pointer;
        font-family: inherit;
        font-size: 11px;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 4px;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
        white-space: nowrap;
      }
      .go-btn:hover {
        color: var(--text);
        border-color: var(--muted2);
      }
      .go-btn.active {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .go-btn-close {
        width: 28px;
        height: 28px;
        justify-content: center;
        font-size: 13px;
        padding: 0;
      }
      .go-view-btn {
        padding: 6px 8px;
        font-size: 12px;
      }
      .go-search input {
        width: 160px;
        padding: 6px 9px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-family: inherit;
        font-size: 11px;
        outline: none;
        transition: border-color 0.15s;
      }
      .go-search input:focus {
        border-color: var(--accent);
      }
      .go-body {
        overflow-y: auto;
        height: calc(100% - 55px);
        padding: 12px 20px 32px;
      }
      .go-section-label {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted2);
        font-weight: 600;
        padding: 12px 0 6px;
      }
      .go-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }
      .go-game {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s,
          box-shadow 0.15s;
        position: relative;
      }
      .go-game:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.15);
      }
      .go-game-img {
        width: 100%;
        aspect-ratio: 460/215;
        object-fit: cover;
        display: block;
        background: #0a0a0a;
      }
      .go-game.no-img .go-game-img {
        display: none;
      }
      .go-game.no-img {
        min-height: 80px;
        justify-content: center;
      }
      .go-game-info {
        padding: 8px 10px 10px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .go-game-name {
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .go-game-meta {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .go-game-badge {
        font-size: 8px;
        letter-spacing: 0.06em;
        padding: 2px 5px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted2);
        white-space: nowrap;
      }
      .go-game-plays {
        font-size: 8px;
        color: var(--muted2);
      }
      .go-pin {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        backdrop-filter: blur(4px);
        z-index: 2;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .go-pin:hover {
        color: var(--accent);
        background: rgba(0, 0, 0, 0.8);
      }
      .go-pin.pinned {
        color: var(--accent);
        border-color: var(--accent-dim);
      }

      /* List view */
      .go-list {
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .go-list .go-game {
        flex-direction: row;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        min-height: 0;
        border-radius: 8px;
        transform: none;
      }
      .go-list .go-game:hover {
        transform: none;
      }
      .go-list .go-game-img {
        width: 60px;
        height: 28px;
        aspect-ratio: auto;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .go-list .go-game.no-img .go-game-img {
        display: none;
      }
      .go-list .go-game-info {
        flex: 1;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        padding: 0;
      }
      .go-list .go-game-name {
        flex: 1;
        font-size: 11px;
      }
      .go-list .go-game-meta {
        flex-shrink: 0;
      }
      .go-list .go-pin {
        position: static;
        flex-shrink: 0;
        order: -1;
      }

      .go-empty,
      .go-loading {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        padding: 48px 0;
      }
      .go-loading::after {
        content: '';
        display: block;
        margin: 12px auto 0;
        width: 24px;
        height: 24px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: go-spin 0.8s linear infinite;
      }
      @keyframes go-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="go-header">
      <h1>Game Library</h1>
      <div class="go-search">
        <input id="goSearch" placeholder="Filter..." oninput="filterGames()" />
      </div>
      <button class="go-btn go-view-btn" id="goViewToggle" onclick="toggleView()" title="Toggle view">▦</button>
      <button class="go-btn go-btn-close" onclick="closePicker()" title="Close">✕</button>
    </div>
    <div class="go-body" id="goBody">
      <div class="go-loading">Scanning installed games...</div>
    </div>

    <script>
      (function applyAccent() {
        const m = location.search.match(/[?&]accent=([^&]+)/);
        if (m) {
          const accent = '#' + m[1].replace(/^#/, '');
          const root = document.documentElement;
          root.style.setProperty('--accent', accent);
          const r = parseInt(accent.slice(1, 3), 16);
          const g = parseInt(accent.slice(3, 5), 16);
          const b = parseInt(accent.slice(5, 7), 16);
          if (!isNaN(r + g + b)) {
            root.style.setProperty('--accent-rgb', r + ',' + g + ',' + b);
            root.style.setProperty('--accent-dim', 'rgba(' + r + ',' + g + ',' + b + ',0.12)');
          }
        }
      })();

      let allGames = [];
      let currentView = 'grid';

      function lsGet(key, def) {
        try {
          return JSON.parse(localStorage.getItem(key) || JSON.stringify(def));
        } catch {
          return def;
        }
      }
      function lsSet(key, val) {
        localStorage.setItem(key, JSON.stringify(val));
      }

      function getPlayCounts() {
        return lsGet('ns_game_plays', {});
      }
      function recordPlay(gameId) {
        const counts = getPlayCounts();
        counts[gameId] = (counts[gameId] || 0) + 1;
        lsSet('ns_game_plays', counts);
      }
      function getPins() {
        return lsGet('ns_game_pins', []);
      }
      function isPinned(id) {
        return getPins().includes(id);
      }
      function togglePin(id, event) {
        if (event) event.stopPropagation();
        let pins = getPins();
        if (pins.includes(id)) pins = pins.filter((p) => p !== id);
        else pins.push(id);
        lsSet('ns_game_pins', pins);
        renderGames();
      }
      function closePicker() {
        parent.postMessage({ type: 'close-games' }, '*');
      }

      function toggleView() {
        currentView = currentView === 'grid' ? 'list' : 'grid';
        lsSet('ns_game_view', currentView);
        document.getElementById('goViewToggle').textContent = currentView === 'grid' ? '≡' : '▦';
        renderGames();
      }

      function loadGames() {
        currentView = lsGet('ns_game_view', 'grid');
        document.getElementById('goViewToggle').textContent = currentView === 'grid' ? '≡' : '▦';

        // Check sessionStorage cache to avoid re-scanning
        try {
          const cached = sessionStorage.getItem('ns_games');
          const cachedAt = sessionStorage.getItem('ns_games_at');
          if (cached && cachedAt && Date.now() - parseInt(cachedAt) < 20000) {
            allGames = JSON.parse(cached);
            renderGames();
            return;
          }
        } catch {}

        document.getElementById('goBody').innerHTML = '<div class="go-loading">Scanning installed games...</div>';
        fetch('/api/games')
          .then((r) => r.json())
          .then((d) => {
            allGames = d.games || [];
            try {
              sessionStorage.setItem('ns_games', JSON.stringify(allGames));
              sessionStorage.setItem('ns_games_at', String(Date.now()));
            } catch {}
            renderGames();
          })
          .catch(() => {
            renderGames();
          });
      }

      function renderGames(filter) {
        const body = document.getElementById('goBody');
        const q = (filter || '').toLowerCase().trim();
        let list = q ? allGames.filter((g) => g.name.toLowerCase().includes(q)) : [...allGames];

        if (!list.length) {
          body.innerHTML =
            '<div class="go-empty">' + (q ? 'No games match "' + q + '".' : 'No games found.') + '</div>';
          return;
        }

        const counts = getPlayCounts();
        const pins = getPins();
        list.sort((a, b) => {
          const pa = counts[a.id] || 0;
          const pb = counts[b.id] || 0;
          if (pa !== pb) return pb - pa;
          return a.name.localeCompare(b.name);
        });

        const pinned = list.filter((g) => pins.includes(g.id));
        const unpinned = list.filter((g) => !pins.includes(g.id));
        const recent = unpinned.filter((g) => (counts[g.id] || 0) > 0);
        const rest = unpinned.filter((g) => !(counts[g.id] || 0) > 0);

        const isGrid = currentView === 'grid';
        const wrap = isGrid ? 'go-grid' : 'go-list';
        const html = [];
        if (pinned.length) {
          html.push('<div class="go-section-label">Pinned</div>');
          html.push('<div class="' + wrap + '">' + pinned.map((g) => gameTile(g)).join('') + '</div>');
        }
        if (recent.length) {
          html.push('<div class="go-section-label">Recently Played</div>');
          html.push('<div class="' + wrap + '">' + recent.map((g) => gameTile(g)).join('') + '</div>');
        }
        if (rest.length) {
          html.push('<div class="go-section-label">All Games</div>');
          html.push('<div class="' + wrap + '">' + rest.map((g) => gameTile(g)).join('') + '</div>');
        }
        body.innerHTML = html.join('');

        body.querySelectorAll('.go-game').forEach((el) => {
          el.onclick = () => {
            const gameId = el.dataset.id;
            const launcher = el.dataset.launcher;
            const name = el.dataset.name;
            recordPlay(gameId);
            parent.postMessage({ type: 'launch-game', launcher, gameId, name }, '*');
          };
        });
        body.querySelectorAll('.go-game-img').forEach((img) => {
          img.onerror = () => {
            img.style.display = 'none';
            img.parentElement.classList.add('no-img');
          };
        });
      }

      function gameTile(g) {
        const counts = getPlayCounts();
        const times = counts[g.id] || 0;
        const pinned = isPinned(g.id);
        const imgUrl = g.launcher === 'steam' ? '/api/game-art/' + g.id : g.artCover || '';
        const name = g.name.replace(/[<>"&]/g, '');
        return (
          '<div class="go-game' +
          (imgUrl ? '' : ' no-img') +
          '" data-id="' +
          g.id +
          '" data-launcher="' +
          g.launcher +
          '" data-name="' +
          name +
          '">' +
          '<button class="go-pin' +
          (pinned ? ' pinned' : '') +
          '" onclick="event.stopPropagation();togglePin(\'' +
          g.id +
          '\', event)" title="' +
          (pinned ? 'Unpin' : 'Pin') +
          '">' +
          (pinned ? '★' : '☆') +
          '</button>' +
          (imgUrl ? '<img class="go-game-img" src="' + imgUrl + '" alt="' + name + '" loading="lazy">' : '') +
          '<div class="go-game-info">' +
          '<span class="go-game-name">' +
          name +
          '</span>' +
          '<div class="go-game-meta">' +
          '<span class="go-game-badge">' +
          g.launcher +
          '</span>' +
          (times ? '<span class="go-game-plays">' + times + (times === 1 ? ' play' : ' plays') + '</span>' : '') +
          '</div>' +
          '</div>' +
          '</div>'
        );
      }

      window.filterGames = function () {
        renderGames(document.getElementById('goSearch').value);
      };

      loadGames();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NearsecTogether Setup</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Fixed: This ensures the black background fills the entire window */
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #080808;
        color: #e8e8e8;
        font-family: 'IBM Plex Mono', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .card {
        background: #141414;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 40px;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      img {
        width: 80px;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 15px rgba(192, 132, 252, 0.4));
      }
      h1 {
        margin: 0 0 10px;
        color: #c084fc;
        font-size: 24px;
      }
      p {
        color: #888;
        line-height: 1.6;
        margin-bottom: 24px;
        font-size: 13px;
      }

      .btn-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 20px;
      }
      button {
        background: #c084fc;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: bold;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: #d495ff;
        transform: scale(1.02);
      }
      button:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
        transform: none;
      }

      .skip-btn {
        background: #222;
        color: #aaa;
        border: 1px solid #333;
      }
      .skip-btn:hover {
        background: #333;
        color: #fff;
        border-color: #555;
      }

      #status {
        margin-top: 20px;
        font-size: 12px;
        color: #facc15;
        min-height: 16px;
      }
      .err {
        color: #f87171 !important;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="../../assets/NearsecTogetherLogo.png" alt="Logo" />
      <h1>First Time Setup</h1>
      <p>NearsecTogether needs to install system dependencies (drivers and virtual controllers) to run properly.</p>
      <p style="font-size: 11px; color: #555">A terminal window will pop up to run the installation.</p>

      <div class="btn-row">
        <button id="btn" onclick="startSetup()">Run Setup</button>
        <button class="skip-btn" onclick="window.electronAPI.continueBoot()">Skip for now</button>
      </div>
      <div id="status"></div>
    </div>

    <script src="../scripts/i18n.js"></script>
    <script>
      function startSetup() {
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.textContent = 'Running...';
        status.className = '';
        status.textContent = 'Please check the terminal window that just opened...';

        if (window.electronAPI) {
          window.electronAPI.runSetup();

          window.electronAPI.onSetupSuccess(() => {
            status.style.color = '#4ade80';
            status.textContent = 'Success! Starting app...';
            setTimeout(() => window.electronAPI.continueBoot(), 1000);
          });

          window.electronAPI.onSetupFailed((err) => {
            btn.disabled = false;
            btn.textContent = 'Try Again';
            status.className = 'err';
            status.textContent = 'Installation failed or was cancelled.';
          });
        }
      }
    </script>
  </body>
</html>

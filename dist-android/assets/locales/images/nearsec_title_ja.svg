<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="nt-gradient" gradientUnits="userSpaceOnUse" x1="0" y1="50" x2="0" y2="350">
            <stop offset="0%" stop-color="#F472F6" />
            <stop offset="100%" stop-color="#FF5A36" />
        </linearGradient>
        
        <style>
            .font-base {
                font-family: 'Arial', 'Helvetica', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif;
                font-weight: 900;
                font-style: italic;
            }
            .monogram {
                font-size: 210px;
                fill: url(#nt-gradient);
                stroke: #FFFFFF;
                stroke-width: 6px;
                paint-order: stroke fill; 
                stroke-linejoin: round;
            }
            .main-text {
                font-size: 135px;
                letter-spacing: -3px;
                stroke: none; 
            }
        </style>
    </defs>

    <text x="220" y="210" class="font-base">
        <tspan class="monogram">近</tspan>
        <tspan class="main-text" fill="#FFFFFF" dx="26">く</tspan>
        <tspan class="main-text" fill="#FF5A36" dx="0">セック</tspan>
    </text>

    <text x="250" y="315" class="font-base">
        <tspan class="monogram">一</tspan>
        <tspan class="main-text" fill="#FFFFFF" dx="20">緒に</tspan>
    </text>

</svg>

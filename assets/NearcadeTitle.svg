<svg width="100%" height="100%" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E789FF" stroke-width="1" stroke-opacity="0.10"/>
    </pattern>

    <filter id="neon-glow" filterUnits="userSpaceOnUse" x="0" y="0" width="1200" height="300">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
      </feMerge>
    </filter>

    <linearGradient id="cade-grad" x1="80.0" y1="0" x2="1120.0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E789FF"/>
      <stop offset="100%" stop-color="#FF6D2F"/>
    </linearGradient>
    
    <linearGradient id="first-letter-grad" x1="0" y1="83.0" x2="0" y2="220.0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E789FF"/>
      <stop offset="100%" stop-color="#FF6D2F"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)" />

  <text x="80.0" y="220" text-anchor="start"
        font-family="'Arial', 'Helvetica', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif" font-weight="900" font-style="italic"
        font-size="182.7px" letter-spacing="-2.7px"
        filter="url(#neon-glow)" opacity="0.45">
    <tspan fill="url(#first-letter-grad)">N</tspan><tspan fill="#FFFFFF">EAR</tspan><tspan fill="url(#cade-grad)">CADE</tspan>
  </text>
  
  <text x="80.0" y="220" text-anchor="start"
        font-family="'Arial', 'Helvetica', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif" font-weight="900" font-style="italic"
        font-size="182.7px" letter-spacing="-2.7px"
        stroke="#F2E4E4" stroke-width="6" stroke-linejoin="bevel" fill="#F2E4E4">
    N
  </text>

  <text x="80.0" y="220" text-anchor="start"
        font-family="'Arial', 'Helvetica', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif" font-weight="900" font-style="italic"
        font-size="182.7px" letter-spacing="-2.7px">
    <tspan fill="url(#first-letter-grad)">N</tspan><tspan fill="#FFFFFF">EAR</tspan><tspan fill="url(#cade-grad)">CADE</tspan>
  </text>
</svg>
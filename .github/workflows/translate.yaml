name: Translate README

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # STRICTLY REQUIRED for the push to work
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Translate - Spanish
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'es'

      - name: Translate - French
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'fr'

      - name: Translate - German
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'de'

      - name: Translate - Portuguese
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'pt'

      - name: Translate - Japanese
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'ja'

      # THIS IS THE MISSING STEP THAT SAVES THE FILES
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.*.md
          git commit -m "docs: add automated translations" || echo "No changes to commit"
          git push

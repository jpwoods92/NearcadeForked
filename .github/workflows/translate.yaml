name: Auto Translate README

on:
  push:
    branches:
      - main # Change to 'master' if your default branch uses that name
    paths:
      - 'README.md' # Only runs when your root README actually changes

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to save translated files to your repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto Translate
        uses: action-translate-readme/auto-translate-readme@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          languages: es, fr, de, pt, ja # Your target ISO codes (excluding 'en')

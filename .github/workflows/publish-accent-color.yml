name: Publish @nearcade/accent-color

on:
  push:
    tags:
      - 'accent-color-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        working-directory: drafts/accent-color

name: Deploy Nearsec Website (GitHub Pages)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies (Skip Desktop Modules)
        run: npm install --ignore-scripts

      - name: Prepare Website Files
        run: |
          mkdir -p dist/arcade

          cp website/nearsec-home.html dist/index.html
          cp website/nearsec-arcade.html dist/arcade/index.html
          cp website/arcade.js dist/arcade/arcade.js

          cp -r assets dist/assets
          cp assets/NearsecTogether.png dist/NearsecTogether.png

          cp -r src/scripts dist/scripts
          cp -r src/pages dist/pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

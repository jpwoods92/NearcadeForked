name: Version Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  actions: write

jobs:
  # Manually triggered: bump the chosen version part, tag it, and kick off
  # the release build. Tags/commits pushed here use the default GITHUB_TOKEN,
  # which GitHub deliberately does not let trigger other workflows via the
  # push event — so we explicitly dispatch release.yml instead of relying on
  # its `push: tags: v*` trigger to fire on its own.
  manual-bump:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main

      - name: Bump ${{ inputs.bump }} version
        run: |
          npm version "${{ inputs.bump }}" -m "chore: bump version to v%s"

      - name: Push commit and tag
        run: git push --follow-tags origin main

      - name: Trigger release build
        run: gh workflow run release.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs on every push to main and bumps the patch version only — no tag, no
  # release build. Guarded against its own commit (and the manual-bump job's
  # commit) to avoid looping: both use the same "chore: bump version to v"
  # message prefix.
  auto-patch-bump:
    if: |
      github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version to v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main

      - name: Bump patch version (no tag)
        run: npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to v$VERSION"
          git push origin main

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      # Note: can't use --omit=optional here — vite's rolldown bundler ships its
      # platform native binding as an optionalDependency, so omitting optional
      # deps tree-wide breaks vitest, not just the Capacitor/Wrangler deps we
      # actually meant to skip.
      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

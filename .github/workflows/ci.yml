name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      # Lint/tests don't touch Capacitor or Wrangler — both optionalDependencies.
      - name: Install Dependencies
        run: npm ci --omit=optional

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

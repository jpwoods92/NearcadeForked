name: Build & Release NearsecTogether

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. DESKTOP BUILDS ──
  release-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt

      - name: Remove broken launcher symlinks
        shell: bash
        run: |
          rm -f NearsecTogether.cmd
          rm -f NearsecTogether.bat
          rm -f NearsecTogether.command

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      # ── NEW STEP: Install Linux build tools for RPM and Pacman ──
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot

      # This job only builds the Electron desktop app — Capacitor/Android and
      # Wrangler/website deps are optionalDependencies and unused here.
      - name: Install Dependencies
        run: npm ci --omit=optional

      # uinputBridge.node (Linux-only native addon, src/sidecar/input_backends)
      # is no longer committed to git — it's rebuilt fresh here via node-gyp
      # and picked up by electron-builder's `files`/`asarUnpack` globs below.
      - name: Build Linux uinput native addon
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:uinput

      - name: Build Electron App
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --universal --publish always
          else
            npm run dist
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Upload Desktop Binaries
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            APPIMAGE=$(find dist -maxdepth 1 -name "*.AppImage" | head -n 1)
            if [ -n "$APPIMAGE" ]; then
              cp "$APPIMAGE" dist/NearsecTogether-latest.AppImage
            fi
          fi

          for file in dist/*.exe dist/*.dmg dist/*.AppImage dist/*.deb dist/*.rpm; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload ${{ github.ref_name }} "$file" --clobber || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. ANDROID APK BUILD ──
  release-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Web Assets for Android
        run: |
          chmod +x ./bin/build-android.sh
          ./bin/build-android.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ── FIX: Rename the APK before uploading ──
      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk "Nearsec Together (Android).apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'Nearsec Together (Android).apk'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release NearsecTogether

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. DESKTOP BUILDS ──
  desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove broken launcher symlinks
        shell: bash
        run: |
          rm -f NearsecTogether.cmd
          rm -f NearsecTogether.bat
          rm -f NearsecTogether.command

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        # Removing GH_TOKEN here strips electron-builder of its publishing privileges. 
        # It will only compile the binaries into the dist/ folder.
        run: npm run dist

      - name: Force Upload Desktop Binaries
        uses: softprops/action-gh-release@v2
        with:
          # Sweep the dist folder and upload all compiled executable formats
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
            dist/*.deb
            dist/*.snap
            dist/*.zip
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. ANDROID APK BUILD ──
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install NPM dependencies
        run: npm install

      - name: Build Web Assets for Android
        run: |
          chmod +x ./bin/build-android.sh
          ./bin/build-android.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/NearsecTogether-Android.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/NearsecTogether-Android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Nearcade

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 0. CHANGELOG ──
  # Creates (or updates) the GitHub release for this tag with a body listing
  # every commit since the previous release tag, before any build job
  # uploads assets to it.
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate commit list since previous release
        id: notes
        run: |
          CURRENT_TAG="v${{ steps.pkg.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude "$CURRENT_TAG" HEAD 2>/dev/null || true)

          {
            echo "## Commits"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "$PREV_TAG"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
          } | grep -v -E '^- chore:' > release-notes.md

          echo "tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi

  # ── 1. DESKTOP BUILDS ──
  release-desktop:
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt

      - name: Remove broken launcher symlinks
        shell: bash
        run: |
          rm -f Nearcade.cmd
          rm -f Nearcade.bat
          rm -f Nearcade.command

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      # ── NEW STEP: Install Linux build tools for RPM and Pacman ──
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot

      # This job only builds the Electron desktop app — Capacitor/Android and
      # Wrangler/website deps are devDependencies (unused at runtime here) so
      # electron-builder excludes them from the packaged app.
      - name: Install Dependencies
        run: npm ci

      # uinputBridge.node (Linux-only native addon, src/sidecar/input_backends)
      # is no longer committed to git — it's rebuilt fresh here via node-gyp
      # and picked up by electron-builder's `files`/`asarUnpack` globs below.
      - name: Build Linux uinput native addon
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:uinput

      - name: Build Electron App
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --universal
          elif [ "$RUNNER_OS" == "Linux" ]; then
            npx electron-builder --linux
          else
            npx electron-builder --win
          fi
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Place HmBridge.exe alongside the Python backends
            HM_SRC="src/sidecar/input_backends/HmBridge/HmBridge.exe"
            if [ -f "$HM_SRC" ]; then
              mkdir -p dist/win-unpacked/src/sidecar/input_backends/HmBridge/
              cp "$HM_SRC" dist/win-unpacked/src/sidecar/input_backends/HmBridge/HmBridge.exe
              echo "Packaged HmBridge.exe into release"
            else
              echo "::warning::HmBridge.exe not found at $HM_SRC — gamepad disabled"
            fi
            
            for file in dist/*.exe; do
              if [[ "$file" != *"Setup"* ]]; then
                mv "$file" "dist/Nearcade-Portable.exe"
              fi
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        shell: bash
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Force Upload Desktop Binaries
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            APPIMAGE=$(find dist -maxdepth 1 -name "*.AppImage" | head -n 1)
            if [ -n "$APPIMAGE" ]; then
              cp "$APPIMAGE" dist/Nearcade-latest.AppImage
            fi
          fi

          for file in dist/*.exe dist/*.dmg dist/*.AppImage dist/*.deb dist/*.rpm; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "v${{ steps.pkg.outputs.version }}" "$file" --clobber || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. ANDROID APK BUILD ──
  release-android:
    needs: changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Web Assets for Android
        run: |
          chmod +x ./bin/build-android.sh
          ./bin/build-android.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ── FIX: Rename the APK before uploading ──
      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk "Nearcade (Android).apk"

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          files: "Nearcade (Android).apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. ITCH.IO PUBLISHING ──
  publish-itchio:
    needs: [release-desktop, release-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --dir release-assets --clobber

      - name: Rename Assets for Itch.io
        run: |
          cd release-assets
          for file in Nearcade-Setup-*.exe; do [ -f "$file" ] && mv "$file" "Nearcade (Windows).exe"; done
          for file in Nearcade-Portable.exe; do [ -f "$file" ] && mv "$file" "Nearcade (Portable).exe"; done
          for file in Nearcade-*-universal.dmg; do [ -f "$file" ] && mv "$file" "Nearcade (Mac).dmg"; done
          for file in Nearcade-*.AppImage; do [ -f "$file" ] && [[ "$file" != *latest.AppImage ]] && mv "$file" "Nearcade (Linux).AppImage"; done
          for file in Nearcade_*.deb; do [ -f "$file" ] && mv "$file" "Nearcade (Debian).deb"; done
          for file in Nearcade-*.rpm; do [ -f "$file" ] && mv "$file" "Nearcade (RedHat).rpm"; done
          for file in *.apk; do [ -f "$file" ] && mv "$file" "Nearcade (Android).apk"; done

      - name: Wait for previous Itch.io processing (Rate Limit Bypass)
        run: sleep 45

      - name: Publish Windows to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Windows).exe"

      - name: Publish Windows Portable to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows-portable
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Portable).exe"

      - name: Publish macOS to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: mac
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Mac).dmg"

      - name: Publish Linux (AppImage) to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Linux).AppImage"

      - name: Publish Linux (Debian) to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-deb
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Debian).deb"

      - name: Publish Linux (RedHat) to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-rpm
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (RedHat).rpm"

      - name: Publish Android to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: android
          ITCH_GAME: nearcade
          ITCH_USER: cutefame
          PACKAGE: "release-assets/Nearcade (Android).apk"


app-id: org.cutefame.NearsecTogether
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: io.atom.electron.BaseApp
base-version: stable
command: nearsec-together
# The permissions needed for gaming and streaming
finish-args:
  - --share=ipc
  - --share=network             # Required for WebRTC/Pusher
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri               # GPU acceleration for video
  - --socket=pulseaudio        # Audio output
  - --device=all               # Access to gamepads/controllers
  - --filesystem=home:ro       # Optional: read-only access to home for configs

modules:
  - name: node
    buildsystem: simple
    sources:
      - type: archive
        url: https://nodejs.org/dist/v22.0.0/node-v22.0.0-linux-x64.tar.xz
        sha256: 9122e50f2642afd5f6078cafd1f52ede60fc464284384f05c18a04d13d07ae5a

  - name: nearsec-together
    buildsystem: simple
    build-commands:
      - npm install --offline
      - cp -r . /app/main
      - install -Dm755 run.sh /app/bin/nearsec-together
    sources:
      - type: dir
        path: .
      - generated-sources.json     # The dependencies you generated earlier
      - type: script
        dest-filename: run.sh
        commands:
          - exec zsh -c "electron /app/main/app/electron-main.js" # Launch script
